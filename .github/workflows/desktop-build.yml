name: Desktop build

on:
  push:
    branches: [main]
    # Phase 22 — tagged pushes ALSO trigger a build, and the extra
    # release step at the bottom of the job attaches both installers
    # to a GitHub Release. Non-tag pushes continue to produce ephemeral
    # workflow artifacts as before.
    tags: ['v*.*.*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # ---------- macOS: PyInstaller + .dmg ----------
      - name: Install playwright pip package (macOS)
        if: matrix.os == 'macos-latest'
        # Bundled inside the .app so the first-launch bootstrap can invoke
        # `python -m playwright install chromium`. Mirrors the Windows leg
        # below. Not a runtime dep of the desktop client itself, so it's
        # not in pyproject.toml.
        run: pip install "playwright>=1.44"

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: pyinstaller packaging/pyinstaller_mac.spec

      - name: Install create-dmg (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install create-dmg

      - name: Package .dmg (macOS)
        if: matrix.os == 'macos-latest'
        run: bash packaging/build_dmg.sh

      - name: Upload .dmg artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: XT-Forge-macos
          path: dist/XT-Forge.dmg
          if-no-files-found: error

      # ---------- Windows: PyInstaller + Inno Setup ----------
      - name: Install playwright pip package (Windows)
        if: matrix.os == 'windows-latest'
        # Bundled inside the .exe so the first-launch bootstrap can invoke
        # `python -m playwright install chromium`. Not a runtime dep of the
        # desktop client itself, so it's not in pyproject.toml.
        run: pip install "playwright>=1.44"

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: pyinstaller packaging/pyinstaller_win.spec

      # Inno Setup 6.x is pre-installed on windows-latest runners (currently
      # v6.7.1). We only re-invoke `choco install` if `iscc.exe` isn't already
      # on disk — pinning a specific version would trip the "newer version
      # already installed" downgrade guard.
      - name: Ensure Inno Setup is available (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\iscc.exe"
          if (-not (Test-Path $iscc)) {
            choco install innosetup -y --no-progress
          } else {
            Write-Host "Inno Setup already installed at $iscc"
          }

      - name: Package .exe installer (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" packaging\installer.iss
        shell: pwsh

      - name: Upload .exe artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: XT-Forge-windows
          path: dist/XT-Forge-Setup.exe
          if-no-files-found: error

      # ---------- Phase 22 — publish tagged releases ----------
      # softprops/action-gh-release@v2 is idempotent: whichever matrix
      # leg finishes first CREATES the release for this tag; the other
      # leg finds it and just uploads its installer to it. Both files
      # end up in a single Release entry named after the tag.
      #
      # Only fires on `refs/tags/v*.*.*` pushes — regular `main` pushes
      # keep their current "ephemeral artifact only" behaviour.
      - name: Publish GitHub Release (macOS)
        if: startsWith(github.ref, 'refs/tags/v') && matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/XT-Forge.dmg
          fail_on_unmatched_files: true
          generate_release_notes: true

      - name: Publish GitHub Release (Windows)
        if: startsWith(github.ref, 'refs/tags/v') && matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/XT-Forge-Setup.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
